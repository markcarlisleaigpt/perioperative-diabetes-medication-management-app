<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perioperative Diabetes Medication Management Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { color-scheme: light dark; scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: linear-gradient(135deg, #0a1628 0%, #1a2e4a 50%, #0f1f35 100%);
  color: #f5f5f5; line-height: 1.6; min-height: 100vh;
  overflow-x: hidden; position: relative;
}
body::before {
  content:''; position:fixed; top:0; left:0; width:100%; height:100%;
  background: radial-gradient(circle at 20% 50%, rgba(0,200,200,.1) 0%, transparent 50%),
              radial-gradient(circle at 80% 80%, rgba(200,100,200,.05) 0%, transparent 50%);
  pointer-events:none; z-index:0;
}
.container { max-width:680px; margin:0 auto; padding:16px; min-height:100vh; position:relative; z-index:1; }
@keyframes fadeInUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
/* ===== HEADER ===== */
.header-banner {
  background: linear-gradient(135deg, rgba(0,180,219,.15) 0%, rgba(100,80,200,.15) 100%);
  border:1px solid rgba(0,200,220,.3); backdrop-filter:blur(20px);
  border-radius:20px; padding:28px 24px; margin-bottom:20px;
  box-shadow:0 8px 32px rgba(0,0,0,.3); animation:slideDown .6s ease-out;
  text-align:center; position:relative; overflow:hidden;
}
.header-banner::before {
  content:''; position:absolute; top:-50%; right:-50%; width:200%; height:200%;
  background:radial-gradient(circle, rgba(0,200,220,.1) 0%, transparent 70%); pointer-events:none;
}
.clinic-label { font-size:11px; font-weight:700; color:#00c8db; margin-bottom:8px; text-transform:uppercase; letter-spacing:1.2px; }
.header-banner h1 { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; margin-bottom:8px; letter-spacing:-.5px; line-height:1.2; }
.header-banner p { font-size:13px; opacity:.8; font-weight:300; letter-spacing:.3px; }
.step-indicator { font-size:11px; color:#00c8db; margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:1px; }
/* ===== CARDS ===== */
.card {
  background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,.03) 100%);
  border:1px solid rgba(255,255,255,.15); backdrop-filter:blur(20px);
  border-radius:16px; padding:24px; margin-bottom:16px;
  box-shadow:0 8px 32px rgba(0,0,0,.3); animation:fadeInUp .5s ease-out both;
  position:relative;
}
.card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
}
.question { font-size:16px; font-weight:600; margin-bottom:16px; font-family:'Playfair Display',serif; }
.section-label { font-size:11px; font-weight:700; color:#00c8db; margin-bottom:6px; text-transform:uppercase; letter-spacing:1.2px; margin-top:16px; }
.section-label:first-of-type { margin-top:0; }
.section-text { font-size:13.5px; line-height:1.7; color:#d4d4d4; font-weight:300; margin-bottom:12px; }
/* ===== BUTTONS ===== */
button {
  display:block; width:100%; padding:14px 16px; margin-bottom:10px;
  font-size:14px; border:1px solid rgba(255,255,255,.2);
  background:linear-gradient(135deg,rgba(255,255,255,.08) 0%,rgba(255,255,255,.03) 100%);
  color:#f5f5f5; border-radius:10px; cursor:pointer; text-align:left;
  transition:all .3s cubic-bezier(.34,1.56,.64,1); font-family:'Inter',sans-serif; font-weight:500;
  position:relative; overflow:hidden;
}
button:hover { border-color:rgba(0,200,220,.5); background:linear-gradient(135deg,rgba(0,200,220,.15),rgba(100,80,200,.1)); transform:translateY(-1px); box-shadow:0 8px 24px rgba(0,200,220,.2); }
button:active { transform:translateY(0); }
.btn-primary { background:linear-gradient(135deg,#00c8db,#0088aa); border:none; color:#0a1628; font-weight:700; text-align:center; }
.btn-primary:hover { background:linear-gradient(135deg,#00d4e8,#0096ba); border:none; }
.btn-back { background:transparent; border:1px solid rgba(255,255,255,.2); color:#aaa; font-size:13px; padding:10px 14px; text-align:center; margin-bottom:12px; }
.btn-back:hover { border-color:rgba(255,255,255,.4); color:#f5f5f5; transform:none; }
.btn-row { display:flex; gap:10px; }
.btn-row button { flex:1; }
.btn-sm { padding:10px 14px; font-size:13px; margin-bottom:8px; }
/* ===== FORM INPUTS ===== */
.field-group { margin-bottom:16px; }
.field-label { font-size:12px; font-weight:600; color:#00c8db; text-transform:uppercase; letter-spacing:.8px; margin-bottom:6px; display:block; }
input[type="text"], input[type="date"], input[type="number"] {
  width:100%; padding:12px 14px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2);
  border-radius:10px; color:#f5f5f5; font-family:'Inter',sans-serif; font-size:14px;
  transition:border-color .3s;
}
input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus {
  outline:none; border-color:#00c8db; background:rgba(0,200,220,.08);
}
input[type="text"]::placeholder, input[type="number"]::placeholder { color:#666; }
input[type="number"] { -moz-appearance:textfield; }
input[type="number"]::-webkit-inner-spin-button { opacity:.5; }
/* ===== CHECKBOX + RADIO ===== */
.check-label {
  display:flex; align-items:flex-start; gap:12px; padding:12px 14px; margin-bottom:8px;
  background:linear-gradient(135deg,rgba(0,200,220,.06),rgba(100,80,200,.04));
  border:1px solid rgba(0,200,220,.18); border-radius:10px; cursor:pointer; font-size:14px; transition:all .3s;
}
.check-label:hover { background:linear-gradient(135deg,rgba(0,200,220,.12),rgba(100,80,200,.08)); border-color:rgba(0,200,220,.4); }
.check-label.selected { border-color:#00c8db; background:linear-gradient(135deg,rgba(0,200,220,.18),rgba(100,80,200,.1)); }
.check-label { touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select:none; }
.custom-check {
  width:20px; height:20px; border:2px solid rgba(0,200,220,.5); border-radius:4px;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:700; color:transparent; background:transparent;
  transition:all .2s; margin-top:1px;
}
.check-label.selected .custom-check { background:#00c8db; border-color:#00c8db; color:#0a1628; }
.custom-radio {
  width:20px; height:20px; border:2px solid rgba(0,200,220,.5); border-radius:50%;
  flex-shrink:0; display:flex; align-items:center; justify-content:center;
  transition:all .2s; margin-top:1px;
}
.custom-radio::after { content:''; width:10px; height:10px; border-radius:50%; background:transparent; transition:all .2s; }
.check-label.selected .custom-radio { border-color:#00c8db; }
.check-label.selected .custom-radio::after { background:#00c8db; }
input[type="checkbox"], input[type="radio"] { width:17px; height:17px; cursor:pointer; flex-shrink:0; accent-color:#00c8db; margin-top:1px; }
.check-info { font-size:12px; color:#aaa; margin-top:2px; }
.category-header {
  font-size:12px; font-weight:700; color:#00c8db; text-transform:uppercase; letter-spacing:1px;
  padding:10px 0 6px; border-bottom:1px solid rgba(0,200,220,.2); margin-bottom:8px; margin-top:16px;
}
.category-header:first-of-type { margin-top:0; }
.drug-indent { padding-left:8px; }
/* ===== SEARCH ===== */
.search-wrap { position:relative; margin-bottom:16px; }
.search-wrap input { padding-left:36px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#666; font-size:15px; pointer-events:none; }
/* ===== TOGGLE ===== */
.toggle-row { display:flex; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15); border-radius:10px; padding:4px; margin-bottom:16px; gap:4px; }
.toggle-btn { flex:1; padding:9px; font-size:13px; font-weight:600; border:none; border-radius:7px; background:transparent; color:#aaa; cursor:pointer; transition:all .3s; text-align:center; }
.toggle-btn.active { background:linear-gradient(135deg,#00c8db,#0088aa); color:#0a1628; }
/* ===== BADGES ===== */
.badge { display:inline-block; font-size:11px; font-weight:800; padding:4px 10px; border-radius:6px; letter-spacing:.8px; text-transform:uppercase; margin-bottom:10px; }
.badge-hold { background:rgba(220,60,60,.3); border:1px solid rgba(220,60,60,.6); color:#ff9999; }
.badge-continue { background:rgba(40,180,100,.3); border:1px solid rgba(40,180,100,.6); color:#80ffb0; }
.badge-modify { background:rgba(220,160,30,.3); border:1px solid rgba(220,160,30,.6); color:#ffd080; }
.badge-consider { background:rgba(0,180,220,.3); border:1px solid rgba(0,180,220,.6); color:#80e8ff; }
.badge-consult { background:rgba(180,80,220,.3); border:1px solid rgba(180,80,220,.6); color:#d080ff; }
/* ===== RESULT CARDS ===== */
.result-card {
  border:1px solid rgba(255,255,255,.12); border-radius:14px; margin-bottom:16px;
  overflow:hidden; animation:fadeInUp .5s ease-out both;
}
.result-card-header {
  background:linear-gradient(135deg,rgba(0,200,220,.12),rgba(100,80,200,.08));
  border-bottom:1px solid rgba(255,255,255,.1); padding:16px 18px;
}
.result-card-header h3 { font-size:15px; font-weight:700; margin-bottom:4px; }
.result-card-header .drug-list { font-size:12px; color:#aaa; }
.result-card-body { padding:16px 18px; }
.result-section { margin-bottom:14px; }
.result-section:last-child { margin-bottom:0; }
.result-section-label { font-size:10px; font-weight:700; color:#00c8db; text-transform:uppercase; letter-spacing:1px; margin-bottom:5px; }
.result-section-text { font-size:13.5px; line-height:1.7; color:#d4d4d4; }
.evidence-strip {
  background:rgba(0,200,220,.06); border-left:3px solid #00c8db; border:1px solid rgba(0,200,220,.18);
  border-left:3px solid #00c8db; border-radius:8px; padding:12px 14px; margin-top:12px;
  font-size:12px; line-height:1.6; color:#bbb;
}
.evidence-strip strong { color:#00c8db; }
.evidence-link { color:#00d4e8; text-decoration:underline; text-underline-offset:2px; font-weight:600; }
.evidence-link:hover { color:#5ce8ff; }
@media print { .evidence-link { color:#005588 !important; } }
/* ===== FLAGS ===== */
.flag { border-radius:8px; padding:10px 12px; margin-bottom:8px; font-size:12.5px; line-height:1.6; }
.flag-warn { background:rgba(220,160,30,.12); border:1px solid rgba(220,160,30,.35); color:#ffd080; }
.flag-info { background:rgba(0,160,220,.1); border:1px solid rgba(0,160,220,.3); color:#80d8ff; }
.flag-alert { background:rgba(220,60,60,.12); border:1px solid rgba(220,60,60,.35); color:#ff9999; }
/* ===== DISCLAIMER ===== */
.disclaimer {
  background:rgba(220,100,100,.1); border:1px solid rgba(220,100,100,.25);
  border-radius:12px; padding:14px 16px; margin-bottom:18px; font-size:12px; line-height:1.6; color:#d4d4d4;
}
.disclaimer strong { color:#ff9999; }
/* ===== OUTPUT TABS ===== */
.tab-bar { display:flex; gap:8px; margin-bottom:16px; }
.tab { flex:1; padding:11px; font-size:13px; font-weight:600; border:1px solid rgba(255,255,255,.2); border-radius:10px; background:rgba(255,255,255,.05); color:#aaa; cursor:pointer; text-align:center; transition:all .3s; }
.tab.active { background:linear-gradient(135deg,rgba(0,200,220,.2),rgba(100,80,200,.15)); border-color:#00c8db; color:#f5f5f5; }
.tab-content { display:none; }
.tab-content.active { display:block; }
/* ===== PATIENT SHEET ===== */
.patient-sheet-header {
  background:linear-gradient(135deg,rgba(0,200,220,.15),rgba(100,80,200,.1));
  border:1px solid rgba(0,200,220,.3); border-radius:14px; padding:20px; margin-bottom:16px; text-align:center;
}
.patient-sheet-header h2 { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:8px; }
.patient-meta { font-size:13px; color:#ccc; line-height:1.8; }
.patient-drug-card { border:1px solid rgba(255,255,255,.15); border-radius:12px; padding:16px; margin-bottom:14px; }
.patient-drug-name { font-size:15px; font-weight:700; margin-bottom:12px; color:#00d4e8; }
.patient-section { margin-bottom:12px; }
.patient-section-label { font-size:11px; font-weight:700; color:#00c8db; text-transform:uppercase; letter-spacing:.8px; margin-bottom:5px; }
.patient-section-text { font-size:14px; line-height:1.75; color:#e0e0e0; }
.patient-dietary { background:rgba(0,200,220,.08); border:1px solid rgba(0,200,220,.25); border-radius:8px; padding:12px; margin-top:10px; }
.patient-dietary-label { font-size:11px; font-weight:700; color:#00c8db; text-transform:uppercase; letter-spacing:.8px; margin-bottom:4px; }
.patient-footer { border:1px solid rgba(255,255,255,.1); border-radius:12px; padding:16px; margin-top:8px; font-size:12px; color:#aaa; line-height:1.7; }
/* ===== DOSE INPUT ===== */
.dose-group { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
.dose-group label { font-size:13px; color:#ccc; flex:1; }
.dose-group input { width:80px; flex:none; }
.dose-group .units { font-size:12px; color:#888; flex:none; }
/* ===== MISC ===== */
.helper-text { font-size:12px; color:#888; line-height:1.5; margin-bottom:14px; font-style:italic; }
.divider { border:none; border-top:1px solid rgba(255,255,255,.08); margin:16px 0; }
.selected-count { font-size:12px; color:#00c8db; margin-bottom:12px; font-weight:600; }
.no-meds-msg { font-size:13px; color:#888; text-align:center; padding:20px; }
/* ===== PRINT STYLES ===== */
@media print {
  body { background:#fff !important; color:#111 !important; }
  body::before { display:none; }
  .container { max-width:100%; padding:0; }
  .no-print { display:none !important; }
  .print-only { display:block !important; }
  .patient-sheet-header, .patient-drug-card, .patient-footer { border-color:#ccc !important; background:#f9f9f9 !important; }
  .patient-drug-name { color:#005588 !important; }
  .patient-section-label { color:#005588 !important; }
  .patient-section-text { color:#111 !important; }
  .patient-meta { color:#333 !important; }
  .patient-dietary { background:#eef9ff !important; border-color:#99d0e8 !important; }
  .patient-dietary-label { color:#005588 !important; }
  .patient-footer { color:#555 !important; border-color:#ccc !important; background:#f9f9f9 !important; }
  .tab-bar, .btn-row, button { display:none !important; }
  .tab-content { display:block !important; }
  #clinician-tab { display:none !important; }
  #patient-tab { display:block !important; }
}
</style>
</head>

  const directMet = DRUG_DB.metformin.drugs.filter(d => selected.has(d.id));
  // Combo metformin
  const comboMet = [...DRUG_DB.sglt2i.drugs, ...DRUG_DB.dpp4i.drugs, ...DRUG_DB.tzd.drugs]
    .filter(d => selected.has(d.id) && d.combo && d.combo.includes('metformin'));
  if (!directMet.length && !comboMet.length) return null;
  // If all metformin comes via combo products handled in other class results, skip standalone
  if (!directMet.length) return null; // combo metformin is handled within combo drug card
  const flags = [];
  const eGFR = parseFloat(details.eGFR);
  const contrast = details.contrastWithin48h;
  let badge, badgeType, morningOf, patientMorning;
  if (!details.eGFR || isNaN(eGFR)) {
    flags.push({ type: 'warn', text: 'eGFR not entered. Conservative HOLD applied. Enter eGFR to enable risk-stratified recommendation.' });
    badge = 'HOLD'; badgeType = 'hold';
    morningOf = 'HOLD morning of surgery (eGFR not available — conservative default applied).';
    patientMorning = 'Do NOT take this medication on the morning of surgery.';
  } else if (eGFR < 30) {
    badge = 'HOLD'; badgeType = 'hold';
    flags.push({ type: 'alert', text: `eGFR ${eGFR} mL/min/1.73m² is below 30. Metformin is contraindicated at this renal function level per FDA labeling. HOLD and reassess before restarting.` });
    morningOf = `HOLD — eGFR ${eGFR} mL/min/1.73m². Metformin is contraindicated below eGFR 30 (FDA labeling).`;
    patientMorning = 'Do NOT take this medication on the morning of surgery. Your kidney function requires that this medication be held.';
  } else if (eGFR < 45) {
    badge = 'HOLD'; badgeType = 'hold';
    flags.push({ type: 'warn', text: `eGFR ${eGFR} mL/min/1.73m² is between 30 and 45. Per FDA labeling, metformin should not be initiated in this range, and for patients already taking it the benefit/risk of continuing should be assessed. Hold perioperatively and reassess renal function before restarting.` });
    morningOf = `HOLD morning of surgery — eGFR ${eGFR} mL/min/1.73m². FDA: do not initiate at eGFR 30–45; for ongoing use assess benefit/risk. Hold and reassess before restarting.`;
    patientMorning = 'Do NOT take this medication on the morning of surgery. Your kidney function is reduced, so it should be held and reviewed before restarting.';
  } else {
    if (contrast === true) {
      badge = 'HOLD'; badgeType = 'hold';
      flags.push({ type: 'alert', text: 'Iodinated contrast within 48h of surgery — HOLD metformin regardless of eGFR. Risk of contrast-induced nephropathy and subsequent metformin-associated lactic acidosis.' });
      morningOf = `HOLD — iodinated contrast within 48h. Hold even with eGFR ${eGFR}.`;
      patientMorning = 'Do NOT take this medication. You are receiving contrast dye within 48 hours of surgery.';
    } else {
      badge = 'HOLD MORNING OF SURGERY'; badgeType = 'hold';
      morningOf = `HOLD morning of surgery (eGFR ${eGFR} mL/min/1.73m² — above threshold, but ABSMC default is hold on day of surgery per ADA 2026). Note: AHA/ACC 2024 Class 2a states continuation is reasonable for normal renal function. Clinician may use judgment.`;
      patientMorning = 'Do NOT take this medication on the morning of surgery.';
      if (contrast === null) {
        flags.push({ type: 'warn', text: 'Contrast exposure status not confirmed. If patient is receiving iodinated contrast within 48h of surgery, hold metformin regardless of eGFR.' });
      }
    }
  }
  const drugNames = directMet.map(d => `${d.name} (${d.brand})`);
  const evidence = `Source: ADA Standards of Care 2026 (hold on day of surgery). AHA/ACC 2024 — Class 2a: continuation reasonable with normal renal function. Perioperative metformin review 2025 — lactic acidosis risk not well-supported by evidence. FDA labeling: contraindicated below eGFR 30; do not initiate at eGFR 30–45.`;
  const resumption = 'Hold 48 hours postoperatively if any concern about renal function or hemodynamic instability. If contrast used: hold 48h post-contrast, reassess eGFR before restarting. Resume when oral intake established and renal function stable. Verify with surgeon.';
  return {
    id: 'metformin',
    drugClass: 'Metformin',
    drugNames,
    badge,
    badgeType,
    clinician: { nightBefore: null, morningOf, monitoring: null, resumption, evidence },
    patient: { nightBefore: null, morningOf: patientMorning, dietary: null },
    flags,
    comboFlag: null,
  };
}
function getSulfonylureResults(ctx, details, selected) {
  const drugs = getSelectedDrugsByClass(selected, 'sulfonylurea');
  if (!drugs.length) return null;
  const timing = ctx.surgeryTiming;
  const flags = [];
  const nightBeforeAgents = drugs.filter(d => d.holdTiming === 'night-before');
  const morningAgents = drugs.filter(d => d.holdTiming === 'morning-of');
  let nightBeforeText = null;
  let morningText = '';
  let patientNight = null;
  let patientMorning = '';
  if (nightBeforeAgents.length) {
    const names = nightBeforeAgents.map(d => `${d.name} (${d.brand})`).join('; ');
    nightBeforeText = `HOLD the EVENING DOSE the night before surgery: ${names}. These long-acting agents have extended duration and holding the evening dose prevents nocturnal or early morning hypoglycemia.`;
    patientNight = `SKIP your evening dose the night before surgery: ${names}. Do not take it that night.`;
  }
  if (morningAgents.length) {
    const names = morningAgents.map(d => `${d.name} (${d.brand})`).join('; ');
    morningText += `HOLD morning of surgery: ${names}. `;
    patientMorning += `Do NOT take ${names} on the morning of surgery. `;
  }
  if (nightBeforeAgents.length) {
    morningText += 'Do not take any evening-hold agents on the morning of surgery either.';
    patientMorning += 'Do not take any of your evening-held diabetes pills on the morning of surgery.';
  }
  if (timing === 'PM' && morningAgents.length) {
    flags.push({ type: 'warn', text: `PM surgery: ${morningAgents.map(d=>d.name).join(', ')} (short-acting sulfonylurea) — hold on morning of surgery regardless of breakfast. Risk of hypoglycemia if taken while eating less than usual.` });
  }
  const drugNames = drugs.map(d => `${d.name} (${d.brand})`);
  const evidence = 'Source: ADA Standards of Care 2026. SAMBA Updated Consensus 2024. Sulfonylureas carry the highest perioperative hypoglycemia risk among oral antidiabetic agents.';
  const resumption = 'Resume when tolerating regular meals postoperatively and blood glucose is stable. Not appropriate during hospitalization with variable oral intake. Verify with surgeon.';
  const monitoring = 'Monitor for hypoglycemia perioperatively. Blood glucose checks on admission and per institutional protocol.';
  return {
    id: 'sulfonylurea',
    drugClass: 'Sulfonylureas',
    drugNames,
    badge: 'HOLD',
    badgeType: 'hold',
    clinician: { nightBefore: nightBeforeText, morningOf: morningText, monitoring, resumption, evidence },
    patient: { nightBefore: patientNight, morningOf: patientMorning, dietary: null },
    flags,
    comboFlag: null,
  };
}

function getBasalInsulinResults(ctx, details, selected) {
  const drugs = getSelectedDrugsByClass(selected, 'basalInsulin');
  if (!drugs.length) return null;
  const dmType = ctx.dmType;
  const timing = ctx.surgeryTiming;
  const flags = [];
  const results = [];
  if (!dmType) {
    flags.push({ type: 'warn', text: 'Diabetes type not entered — T1DM-conservative (smaller) dose reductions applied. Verify diabetes type with patient.' });
  }
  const isT1 = dmType === 'T1DM' || !dmType;
  // ADA 2026: basal analogs to 75–80% of dose. T1D default is the conservative
  // end (20% reduction → 80%, never more); T2D 20–25%. NPH handled separately at 50%.
  const minReduct = 20; // min % reduction
  const maxReduct = isT1 ? 20 : 25; // max % reduction
  // Collapse "20–20%" to "20%" when the range has no spread (T1D).
  const reductPct = minReduct === maxReduct ? `${minReduct}%` : `${minReduct}–${maxReduct}%`;
  drugs.forEach(drug => {
    const dd = details.insulinDetails[drug.id] || {};
    const dosingTime = dd.dosingTime || (drug.needsDosingTime ? null : 'evening');
    const freq = dd.frequency || (drug.needsFrequency ? null : 'once');
    const eveningDose = parseFloat(dd.eveningDose);
    const morningDose = parseFloat(dd.morningDose);
    let nightBefore = '';
    let morningOf = '';
    let patientNight = '';
    let patientMorning = '';
    const drugFlags = [...flags];
    if (drug.concentrated) {
      drugFlags.push({ type: 'info', text: drug.concentratedNote });
    }
    if (drug.isNPH) {
      // NPH — 50% reduction
      if (freq === 'once') {
        const dt = dosingTime || 'evening';
        const doseStr = isNaN(eveningDose) ? 'reduce by 50%' : `${dosePct(eveningDose, 50)} (50% of your usual ${eveningDose} units)`;
        nightBefore = `REDUCE ${drug.name} (${drug.brand}) by 50% the night before surgery: ${doseStr}. NPH has a peak effect that can cause hypoglycemia while fasting.`;
        morningOf = timing === 'PM'
          ? `REDUCE morning dose by 50%: ${isNaN(morningDose) ? 'half your usual morning dose' : `${dosePct(morningDose, 50)}`}. Check blood glucose before administering.`
          : `Do NOT take a separate morning NPH dose for AM surgery (unless on twice-daily regimen).`;
        patientNight = `Take HALF of your usual ${drug.brand} dose tonight: ${isNaN(eveningDose) ? 'half your usual dose' : doseStr}.`;
        patientMorning = timing === 'PM' ? `Take HALF your usual morning ${drug.brand}: ${isNaN(morningDose) ? 'half your usual morning dose' : `${dosePct(morningDose, 50)}`}.` : 'No separate morning NPH dose needed.';
      } else {
        // NPH twice daily
        const evStr = isNaN(eveningDose) ? 'reduce by 50%' : `${dosePct(eveningDose, 50)} (half of your usual ${eveningDose} units)`;
        const amStr = isNaN(morningDose) ? 'reduce by 50%' : `${dosePct(morningDose, 50)} (half of your usual ${morningDose} units)`;
        nightBefore = `REDUCE evening ${drug.name} (${drug.brand}) by 50%: ${evStr}.`;
        morningOf = `REDUCE morning ${drug.name} (${drug.brand}) by 50%: ${amStr}. Check blood glucose on admission.`;
        patientNight = `Take HALF of your usual evening ${drug.brand}: ${evStr}.`;
        patientMorning = `Take HALF of your usual morning ${drug.brand}: ${amStr}.`;
      }
    } else if (drug.needsFrequency && freq === 'twice') {
      // Detemir twice daily
      const evStr = doseRange(eveningDose, minReduct, maxReduct);
      const amStr = doseRange(morningDose, minReduct, maxReduct);
      const evLabel = evStr ? `${evStr} (reduced from ${eveningDose} units)` : `reduce by ${reductPct}`;
      const amLabel = amStr ? `${amStr} (reduced from ${morningDose} units)` : `reduce by ${reductPct}`;
      nightBefore = `REDUCE evening ${drug.name} (${drug.brand}) by ${reductPct}: ${evLabel}.`;
      morningOf = `REDUCE morning ${drug.name} (${drug.brand}) by ${reductPct}: ${amLabel}. Check blood glucose on admission.`;
      patientNight = `Tonight, take a REDUCED dose of ${drug.brand}: ${evLabel}.`;
      patientMorning = `This morning, take a REDUCED dose of ${drug.brand}: ${amLabel}.`;
    } else {
      // Once-daily basal (evening or morning dosing)
      const dt = dosingTime || 'evening';
      // A once-daily basal has a single dose; the UI stores it in eveningDose
      // whether the patient takes it in the morning or evening. dt only changes
      // the timing wording below, not which dose field to read.
      const dose = eveningDose;
      const doseLabel = doseRange(dose, minReduct, maxReduct);
      const doseText = doseLabel ? `${doseLabel} (reduced from your usual ${dose} units)` : `reduce by ${reductPct} from your usual dose`;
      if (dt === 'evening' || !dt) {
        nightBefore = `REDUCE ${drug.name} (${drug.brand}) by ${reductPct}: Take ${doseText} tonight at your usual time. Check blood glucose on the morning of surgery.`;
        morningOf = 'No morning basal dose needed (once-daily evening dosing). Check blood glucose on admission.';
        patientNight = `Tonight, take a REDUCED dose of ${drug.brand}: ${doseText}.`;
        patientMorning = 'No morning insulin dose needed for your long-acting insulin. Check your blood sugar when you arrive.';
      } else {
        // Morning dosing
        nightBefore = null;
        morningOf = `REDUCE ${drug.name} (${drug.brand}) by ${reductPct}: Take ${doseText} this morning at your usual time before leaving for the hospital. Check blood glucose on admission.`;
        patientNight = null;
        patientMorning = `Take a REDUCED dose of ${drug.brand} this morning: ${doseText}. Take it at your usual time before leaving for the hospital.`;
      }
    }
    if (!dd.dosingTime && drug.needsDosingTime) {
      drugFlags.push({ type: 'info', text: `Dosing time not entered for ${drug.name}. Assuming evening dosing. Verify with patient.` });
    }
    if (!dd.frequency && drug.needsFrequency) {
      drugFlags.push({ type: 'info', text: `Frequency not entered for ${drug.name}. Assuming once daily. Verify with patient.` });
    }
    if (dmType === 'T1DM' && !drug.isNPH) {
      drugFlags.push({ type: 'info', text: 'Type 1 diabetes: 20% is the conservative default — never reduce a basal analog by more than 20% in T1DM. Some patients need their full, unreduced dose; never hold basal entirely (DKA risk). Individualize.' });
    }
    results.push({
      id: `basal-${drug.id}`,
      drugClass: 'Basal Insulin',
      drugNames: [`${drug.name} (${drug.brand})`],
      badge: 'MODIFY DOSE',
      badgeType: 'modify',
      clinician: {
        nightBefore,
        morningOf,
        monitoring: `Check blood glucose on admission. Target perioperative glucose 100–180 mg/dL. Do not hold ALL basal insulin in T1DM — dose reduction required but some basal must be maintained.`,
        resumption: 'Resume usual dose when tolerating oral intake and blood glucose is stable. Verify with prescriber.',
        evidence: `Source: ADA Standards of Care 2026 — long-acting basal analogs given at 75–80% of the usual dose perioperatively, NPH reduced to 50%; the same percentage applies to each injection in twice-daily regimens. ${drug.isNPH ? 'NPH: reduce each dose to 50% (pronounced peak raises fasting hypoglycemia risk).' : (isT1 ? 'T1DM: reduce 20% (to 80%) as the conservative default — never more; some need their full unreduced dose.' : 'T2DM: reduce 20–25% (to 75–80%).')} Target perioperative glucose 100–180 mg/dL.`
      },
      patient: { nightBefore: patientNight, morningOf: patientMorning, dietary: null },
      flags: drugFlags,
      comboFlag: null,
    });
  });
  return results;
}
function getBolusInsulinResults(ctx, details, selected) {

    } else {

    results.push({
      id: `bolus-${drug.id}`,
      drugClass: isInhaled ? 'Inhaled Insulin (Rapid-Acting)' : 'Bolus/Prandial Insulin',
      drugNames: [`${drug.name} (${drug.brand})`],
      badge: 'HOLD WHILE NPO',
      badgeType: 'hold',
      clinician: {
        nightBefore,
        morningOf,
        monitoring: 'Do not administer prandial insulin without food. If blood glucose is >180 mg/dL while NPO, use a correctional insulin protocol per anesthesia/hospitalist team — do not use the patient\'s prandial doses.',
        resumption: 'Resume with first regular meal postoperatively. Dose as usual per meal size.',
        evidence: 'Source: ADA Standards of Care 2026. Universal rule: hold all prandial/bolus insulin while NPO. No exceptions.'
      },
      patient: { nightBefore: patientNight, morningOf: patientMorning, dietary: null },
      flags,
      comboFlag: null,
    });
  });
  return results;
}

        monitoring: 'Check blood glucose before morning dose. Target 100–180 mg/dL perioperatively. Hold entirely if BG <120 mg/dL.',
        resumption: 'Resume usual premixed regimen when tolerating regular meals. Verify with prescriber.',
        evidence: `Source: ADA Standards of Care 2026. Demma et al., J Clin Anesth 2017. JBDS Insulin Table. Evening: reduce ${minReduct}–${maxReduct}%. Morning: reduce 50%; hold if BG <120 mg/dL.`
      },
      patient: { nightBefore: `REDUCE your evening ${drug.brand}: ${nightEvLabel}.`, morningOf: patientMorning, dietary: null },
      flags,
      comboFlag: null,
    });
  });
  return results;
}
function getPumpResult(ctx, details, selected) {
  if (!hasMedClass(selected, 'pump')) return null;
  const dmType = ctx.dmType;
  const timing = ctx.surgeryTiming;
  const flags = [];
  if (dmType === 'T1DM') {
    flags.push({ type: 'alert', text: 'T1DM on insulin pump: NEVER suspend pump for extended periods without an alternative insulin source. If pump is suspended >1 hour during surgery, the anesthesia team must have an IV insulin infusion protocol in place.' });
  }
  flags.push({ type: 'info', text: 'Patient and family/caregiver must be instructed on how to suspend and resume the pump. If pump is suspended intraoperatively at anesthesiologist\'s request, IV insulin infusion will be managed by the surgical/anesthesia team. Pump should be resumed postoperatively when patient is alert and able to manage the device.' });
  const nightBefore = 'Continue pump at current programmed basal rate. No bolus doses unless eating (usual meal rules apply). Check blood glucose at bedtime.';
  const morningOf = timing === 'PM'
    ? 'Continue pump at current basal rate. May bolus normally with breakfast (if eating). Once NPO: continue basal rate only — HOLD further bolus doses until eating postoperatively. Anesthesiologist may request pump suspension — patient/team must know how to suspend.'
    : 'Continue pump at current basal rate. HOLD all bolus doses while NPO. Check blood glucose on arrival. Anesthesiologist may request pump suspension intraoperatively.';
  const patientNight = 'Continue using your insulin pump as usual overnight. Check your blood sugar before bed.';
  const patientMorning = timing === 'PM'
    ? 'Continue wearing your pump. If you are eating breakfast as instructed, you may bolus for your meal as usual. After breakfast and while you are waiting for surgery, do NOT take any more bolus doses.'
    : 'Continue wearing your pump. Do NOT take any bolus doses this morning — you are not eating before surgery. Your pump will continue delivering your background (basal) insulin. Your anesthesiologist may ask you to pause your pump during surgery — make sure you know how to do this.';
  return {
    id: 'pump',
    drugClass: 'Insulin Pump (CSII)',
    drugNames: ['Insulin Pump — Continuous Subcutaneous Insulin Infusion'],
    badge: 'CONTINUE BASAL',
    badgeType: 'continue',
    clinician: {
      nightBefore,
      morningOf,
      monitoring: 'Check blood glucose on admission and per institutional protocol. Target 100–180 mg/dL perioperatively. Ensure anesthesia team aware of CSII and has plan for intraoperative management.',
      resumption: 'Resume pump bolus dosing when patient is alert, able to manage device, and tolerating oral intake. Resume usual settings.',
      evidence: 'Source: ADA Standards of Care 2026. Continue pump at current basal rate; hold bolus while NPO. Anesthesiologist has discretion to suspend.'
    },
    patient: { nightBefore: patientNight, morningOf: patientMorning, dietary: null },
    flags,
    comboFlag: null,
  };
}
function getU500Result(selected) {
  if (!hasMedClass(selected, 'insulinU500')) return null;
  return {
    id: 'u500',
    drugClass: 'Insulin — U-500 (Concentrated)',
    drugNames: ['Regular U-500 (Humulin R U-500)'],
    badge: '⚠️ CONSULT REQUIRED',
    badgeType: 'consult',
    clinician: {
      nightBefore: null,
      morningOf: 'ENDOCRINOLOGY CONSULTATION REQUIRED before surgery. U-500 Regular insulin has a unique PK profile — longer onset and duration than standard regular insulin, behaving more like an intermediate-acting agent. Standard dose-reduction protocols do NOT apply. Do not modify this medication without endocrinology guidance.',
      monitoring: 'Do not apply standard insulin hold/reduction rules. Management requires endocrinology input.',
      resumption: 'Per endocrinology guidance.',
      evidence: 'U-500 Regular is used in severe insulin resistance with very high doses. PK profile is distinct from standard regular insulin. Perioperative management is highly individualized.'
    },
    patient: {
      nightBefore: null,
      morningOf: 'IMPORTANT: Do not change your U-500 insulin dose without specific instructions from your endocrinologist or prescribing doctor. This insulin requires special management around surgery. Your surgical team will contact your diabetes doctor.',
      dietary: null,
    },
    flags: [{ type: 'alert', text: '⛔ U-500 Regular insulin requires endocrinology consultation before elective surgery. Standard perioperative insulin protocols do not apply. Contact prescribing provider.' }],
    comboFlag: null,
  };
}
function getAllResults(ctx, details, selected) {
  const results = [];
  const addResult = (r) => { if (r) { Array.isArray(r) ? results.push(...r) : results.push(r); } };
  addResult(getSGLT2iResults(ctx, details, selected));
  addResult(getGLP1Results(ctx, details, selected));
  addResult(getDPP4iResults(ctx, details, selected));
  addResult(getMetforminResults(ctx, details, selected));
  addResult(getSulfonylureResults(ctx, details, selected));
  addResult(getMeglitinideResults(ctx, details, selected));
  addResult(getTZDResults(ctx, details, selected));
  addResult(getAGIResults(ctx, details, selected));
  addResult(getBasalInsulinResults(ctx, details, selected));
  addResult(getBolusInsulinResults(ctx, details, selected));
  addResult(getPremixedInsulinResults(ctx, details, selected));
  addResult(getPumpResult(ctx, details, selected));
  addResult(getU500Result(selected));
  return results;
}

class PerioperativeDMApp {
  constructor() {
    this.step = 'intro';
    this.outputTab = 'clinician';
    this.searchQuery = '';
    this.state = {
      patient: { firstName: '', lastName: '', dob: '', arrivalTime: '' },
      context: { dmType: null, surgeryType: null, surgeryTiming: null, hasHF: null, hasCKD: null, arrivalTime: '' },
      selected: new Set(),
      details: {
        sglt2iMode: 'FDA',
        a1cOver8: null,
        prolongedFasting: null,
        surgeryOver3h: null,
        eGFR: '',
        contrastWithin48h: null,
        giSymptoms: null,
        insulinDetails: {},
      },
    };
    this.render();
  }
  setState(step) { this.step = step; this.render(); }
  generateInstructions() {
    // NPH dosing frequency must be chosen before generating (peak-related dosing differs).
    const basal = getSelectedDrugsByClass(this.state.selected, 'basalInsulin');
    for (const drug of basal) {
      if (drug.isNPH) {
        const f = (this.state.details.insulinDetails[drug.id] || {}).frequency;
        if (f !== 'once' && f !== 'twice') {
          alert(`Select a dosing frequency for ${drug.name} before continuing.`);
          return;
        }
      }
    }
    this.setState('output');
  }
  setOutputTab(tab) { this.outputTab = tab; this.render(); }
  updatePatient(key, val) { this.state.patient[key] = val; }
  updateContext(key, val) { this.state.context[key] = val; this.render(); }
  updateDetails(key, val) { this.state.details[key] = val; this.render(); }
  // No-render variants: used by free-text/number inputs so typing does not rebuild
  // the DOM mid-keystroke (which previously dropped focus and forced a re-tap per digit).
  updateDetailsNoRender(key, val) { this.state.details[key] = val; }
  updateInsulinDetail(drugId, key, val) {
    if (!this.state.details.insulinDetails[drugId]) this.state.details.insulinDetails[drugId] = {};
    this.state.details.insulinDetails[drugId][key] = val;
    this.render();
  }
  updateInsulinDetailNoRender(drugId, key, val) {
    if (!this.state.details.insulinDetails[drugId]) this.state.details.insulinDetails[drugId] = {};
    this.state.details.insulinDetails[drugId][key] = val;
  }
  toggleDrug(drugId) {
    if (this.state.selected.has(drugId)) this.state.selected.delete(drugId);
    else this.state.selected.add(drugId);
    this.render();
  }
  goBack() {
    const steps = ['intro','patient','context','medications','details','output'];
    const idx = steps.indexOf(this.step);
    if (idx > 0) {
      let prev = steps[idx - 1];
      if (prev === 'details' && !needsDetails(this.state.selected)) prev = 'medications';
      this.setState(prev);
    }
  }
  renderHeader(title, sub, step) {
    return `
      <div class="header-banner">
        <div class="clinic-label">ABSMC Preoperative Clinic · EBAMG · Sutter Health</div>
        ${step ? `<div class="step-indicator">${step}</div>` : ''}
        <h1>${title}</h1>
        ${sub ? `<p>${sub}</p>` : ''}
      </div>`;
  }
  renderBackBtn() {
    return `<button class="btn-back" onclick="window.app.goBack()">← Back</button>`;
  }
  renderIntro() {
    return `
      ${this.renderHeader('💊 Perioperative Diabetes Medication Management Tool', 'Evidence-based perioperative instructions for all diabetes medications')}
      <div class="card">
        <div class="disclaimer">
          <strong>⚠️ Clinical Disclaimer:</strong> This tool is a decision-support aid for qualified healthcare professionals only. It does not replace clinical judgment, institutional protocols, or direct patient assessment. All recommendations should be reviewed by the treating clinical team. Users assume full responsibility for clinical decisions made.
        </div>
        <p class="helper-text">Generates perioperative hold/continue/modify instructions for SGLT2 inhibitors, GLP-1 receptor agonists, DPP-4 inhibitors, metformin, sulfonylureas, thiazolidinediones, meglitinides, alpha-glucosidase inhibitors, and all insulin types including pumps.</p>
        <button class="btn-primary" onclick="window.app.setState('patient')">Begin Assessment →</button>
      </div>`;
  }
  renderPatient() {

          <span class="custom-radio"></span> No

        ${btn('Colonoscopy / endoscopy', 'surgeryType', 'colonoscopy', ctx.surgeryType)}

  validateContextAndContinue() {

  }
  renderMedications() {
    const selected = this.state.selected;
    const q = this.searchQuery.toLowerCase();

      ? drugs.filter(d => d.name.toLowerCase().includes(q) || d.brand.toLowerCase().includes(q))
      : drugs;
    const drugItem = (drug) => {

        </div>
      </div>`;

    const section = (classKey) => {

              <span class="units">units</span>
            </div>` : `
            <div class="section-label">Current ${drug.isNPH ? 'Dose' : (dd.dosingTime === 'morning' ? 'Morning Dose' : 'Evening Dose')}</div>
            <div class="dose-group">
              <label>${dd.dosingTime === 'morning' ? 'Morning dose' : 'Evening/bedtime dose'}</label>
              <input type="number" value="${dd.eveningDose || ''}" placeholder="units" min="0" oninput="window.app.updateInsulinDetailNoRender('${drug.id}','eveningDose',this.value)">
              <span class="units">units</span>
            </div>`}
        </div>`;
    });
    // Bolus insulins
    const bolusDrugs = getSelectedDrugsByClass(sel, 'bolusInsulin');
    bolusDrugs.forEach(drug => {
      const dd = details.insulinDetails[drug.id] || {};
      html += `
        <div class="card">
          <div class="question" style="font-size:15px;">${drug.name} <span style="color:#888;font-size:13px;">(${drug.brand})</span></div>
          <p class="helper-text">Prandial insulin — will be held while NPO. Enter current doses for patient instructions.</p>
          <div class="section-label">Breakfast Dose (units)</div>
          <div class="dose-group">
            <label>Breakfast</label>
            <input type="number" value="${dd.breakfastDose || ''}" placeholder="units" min="0" oninput="window.app.updateInsulinDetailNoRender('${drug.id}','breakfastDose',this.value)">
            <span class="units">units</span>
          </div>
          <div class="section-label">Lunch Dose (units)</div>
          <div class="dose-group">
            <label>Lunch</label>
            <input type="number" value="${dd.lunchDose || ''}" placeholder="units" min="0" oninput="window.app.updateInsulinDetailNoRender('${drug.id}','lunchDose',this.value)">
            <span class="units">units</span>
          </div>
          <div class="section-label">Dinner Dose (units)</div>
          <div class="dose-group">
            <label>Dinner</label>
            <input type="number" value="${dd.dinnerDose || ''}" placeholder="units" min="0" oninput="window.app.updateInsulinDetailNoRender('${drug.id}','dinnerDose',this.value)">
            <span class="units">units</span>
          </div>
        </div>`;
    });
    // Premixed insulins
    const premixDrugs = getSelectedDrugsByClass(sel, 'premixedInsulin');
    premixDrugs.forEach(drug => {
      const dd = details.insulinDetails[drug.id] || {};
      html += `
        <div class="card">
          <div class="question" style="font-size:15px;">${drug.name} <span style="color:#888;font-size:13px;">(${drug.brand})</span></div>
          <div class="section-label">Evening / Bedtime Dose</div>
          <div class="dose-group">
            <label>Evening dose</label>
            <input type="number" value="${dd.eveningDose || ''}" placeholder="units" min="0" oninput="window.app.updateInsulinDetailNoRender('${drug.id}','eveningDose',this.value)">
            <span class="units">units</span>
          </div>
          <div class="section-label">Morning Dose</div>
          <div class="dose-group">
            <label>Morning dose</label>
            <input type="number" value="${dd.morningDose || ''}" placeholder="units" min="0" oninput="window.app.updateInsulinDetailNoRender('${drug.id}','morningDose',this.value)">
            <span class="units">units</span>
          </div>
        </div>`;
    });
    return `
      ${this.renderHeader('Medication Details', 'Required for personalized instructions', 'Step 4 of 5')}
      ${this.renderBackBtn()}
      ${html}
      <button class="btn-primary" onclick="window.app.generateInstructions()">Generate Instructions →</button>`;
  }
  renderOutput() {
    const results = getAllResults(this.state.context, this.state.details, this.state.selected);
    const p = this.state.patient;
    const patientName = [p.firstName, p.lastName].filter(Boolean).join(' ') || 'Patient';
    return `
      ${this.renderHeader('💊 Perioperative Medication Instructions', patientName + (p.dob ? ` · DOB: ${p.dob}` : ''), 'Step 5 of 5 — Results')}
      <div class="no-print">
        ${this.renderBackBtn()}
        <div class="tab-bar">
          <div class="tab ${this.outputTab==='clinician'?'active':''}" onclick="window.app.setOutputTab('clinician')">🩺 Clinician Summary</div>
          <div class="tab ${this.outputTab==='patient'?'active':''}" onclick="window.app.setOutputTab('patient')">📄 Patient Sheet</div>
        </div>
      </div>
      <div id="clinician-tab" class="tab-content ${this.outputTab==='clinician'?'active':''} no-print">
        ${results.map(r => this.renderClinicianCard(r)).join('')}
        <div class="card" style="font-size:12px;color:#888;line-height:1.7;">
          <div style="font-weight:700;color:#00c8db;margin-bottom:8px;">📋 ABSMC PREOPERATIVE GLYCEMIC GOALS</div>
          <div>• Perioperative blood glucose target: <strong style="color:#f5f5f5;">100–180 mg/dL</strong></div>
          <div>• Stricter targets are NOT recommended — increase hypoglycemia without improving outcomes (ADA 2026)</div>
          <div>• HbA1c alone is NOT a reason to postpone elective surgery (ADA 2026)</div>
          <div>• CGM may be used as adjunct but NOT sole monitoring modality intraoperatively</div>
          <div style="margin-top:8px;font-style:italic;">ADA Standards of Care 2026 · ABSMC Preoperative Clinic · Sutter Health</div>
        </div>
        <div class="btn-row no-print" style="margin-top:8px;">
          <button class="btn-primary" onclick="window.app.startOver()">New Assessment</button>
        </div>
      </div>
      <div id="patient-tab" class="tab-content ${this.outputTab==='patient'?'active':''}">
        ${this.renderPatientSheet(results)}
        <div class="btn-row no-print" style="margin-top:12px;">
          <button class="btn-primary" onclick="window.app.printSheet()">🖨️ Print</button>
          <button class="btn-primary" onclick="window.app.savePDF()">📄 Save as PDF</button>
        </div>
        <div class="btn-row no-print" style="margin-top:8px;">
          <button onclick="window.app.startOver()">New Assessment</button>
        </div>
      </div>`;
  }
  renderClinicianCard(r) {
    const badgeHtml = `<span class="badge badge-${r.badgeType}">${r.badge}</span>`;
    const sectionHtml = (label, text, icon='') => text
      ? `<div class="result-section">
          <div class="result-section-label">${icon} ${label}</div>
          <div class="result-section-text">${text}</div>
         </div>` : '';
    const flagsHtml = r.flags.map(f => `<div class="flag flag-${f.type}">${f.text}</div>`).join('');
    const comboHtml = r.comboFlag ? `<div class="flag flag-warn">${r.comboFlag}</div>` : '';
    return `
      <div class="result-card">
        <div class="result-card-header">
          ${badgeHtml}
          <h3>${r.drugClass}</h3>
          <div class="drug-list">${r.drugNames.join(' · ')}</div>
        </div>
        <div class="result-card-body">
          ${comboHtml}
          ${flagsHtml}
          ${sectionHtml('Night Before Surgery', r.clinician.nightBefore, '🌙')}
          ${sectionHtml('Morning of Surgery', r.clinician.morningOf, '🌅')}
          ${sectionHtml('Dietary Instructions', r.clinician.dietary, '🥤')}
          ${sectionHtml('Monitoring', r.clinician.monitoring, '🔬')}
          ${sectionHtml('Resumption', r.clinician.resumption, '🔄')}
          ${r.clinician.evidence ? `<div class="evidence-strip"><strong>📚 Evidence:</strong> ${linkifyGuidelines(r.clinician.evidence)}</div>` : ''}
        </div>
      </div>`;
  }
  renderPatientSheet(results) {
    const p = this.state.patient;
    const patientName = [p.firstName, p.lastName].filter(Boolean).join(' ') || '[Patient Name]';
    const ctx = this.state.context;
    const header = `
      <div class="patient-sheet-header">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;color:#00c8db;margin-bottom:8px;">ALTA BATES SUMMIT MEDICAL CENTER · SUTTER HEALTH<br>PREOPERATIVE CLINIC · MEDICATION INSTRUCTIONS</div>
        <h2>Surgery Preparation Instructions</h2>
        <div class="patient-meta">
          ${patientName}${p.dob ? ` · DOB: ${p.dob}` : ''}${p.arrivalTime ? ` · Arrival: ${p.arrivalTime}` : ''}<br>
          ${ctx.surgeryTiming === 'AM' ? 'AM Surgery' : 'PM Surgery'} · ${ctx.surgeryType ? ctx.surgeryType.replace('majorNoncardiac','Major Noncardiac Surgery').replace('minor','Minor Procedure').replace('colonoscopy','Colonoscopy').replace('cardiac','Cardiac Surgery').replace('bariatric','Bariatric Surgery') : ''}
        </div>
      </div>`;
    const cards = results.map(r => {
      const sec = (label, text, extra='') => text
        ? `<div class="patient-section">
            <div class="patient-section-label">${label}</div>
            <div class="patient-section-text">${text}</div>
            ${extra}
           </div>` : '';
      const dietaryHtml = r.patient.dietary
        ? `<div class="patient-dietary">
            <div class="patient-dietary-label">🥤 Important Dietary Instruction</div>
            <div class="patient-section-text">${r.patient.dietary}</div>
           </div>` : '';
      return `
        <div class="patient-drug-card">
          <div class="patient-drug-name">${r.drugClass}: ${r.drugNames.join(', ')}</div>
          ${sec('The Night Before Surgery', r.patient.nightBefore)}
          ${sec('The Morning of Surgery', r.patient.morningOf)}
          ${dietaryHtml}
        </div>`;
    }).join('');
    const footer = `
      <div class="patient-footer">
        <div style="margin-bottom:6px;"><strong>Questions?</strong> Call the ABSMC Preoperative Clinic: <strong>(510) 869-8865</strong></div>
        <div style="margin-bottom:6px;">These instructions apply to your <strong>diabetes medications only</strong>. Continue all other medications as instructed by your surgeon.</div>
        <div style="margin-bottom:6px;"><strong>Important:</strong> These recommendations were generated based on information available at your preoperative visit. Please verify your arrival time with your surgeon's office, as surgery times can change. Resuming any medications after surgery requires your surgeon's approval.</div>
        <div style="font-size:11px;color:#888;margin-top:8px;">Alta Bates Summit Medical Center Preoperative Clinic · Sutter Health · Generated ${new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
      </div>`;
    return header + cards + footer;
  }
  printSheet() {
    this.outputTab = 'patient';
    this.render();
    setTimeout(() => window.print(), 100);
  }
  savePDF() {
    this.outputTab = 'patient';
    this.render();
    setTimeout(() => {
      alert('In the print dialog that opens, select "Save as PDF" as your destination (or "Print to PDF" on some devices).');
      window.print();
    }, 100);
  }
  startOver() {
    this.step = 'intro';
    this.outputTab = 'clinician';
    this.searchQuery = '';
    this.state = {
      patient: { firstName: '', lastName: '', dob: '', arrivalTime: '' },
      context: { dmType: null, surgeryType: null, surgeryTiming: null, hasHF: null, hasCKD: null, arrivalTime: '' },
      selected: new Set(),
      details: { sglt2iMode: 'FDA', a1cOver8: null, prolongedFasting: null, surgeryOver3h: null, eGFR: '', contrastWithin48h: null, giSymptoms: null, insulinDetails: {} },
    };
    this.render();
  }
  render() {
    let html = '';
    if (this.step === 'intro') html = this.renderIntro();
    else if (this.step === 'patient') html = this.renderPatient();
    else if (this.step === 'context') html = this.renderContext();
    else if (this.step === 'medications') html = this.renderMedications();
    else if (this.step === 'details') html = this.renderDetails();
    else if (this.step === 'output') html = this.renderOutput();
    document.getElementById('app').innerHTML = html;
  }
}
window.app = new PerioperativeDMApp();
</script>
</body>
</html>
